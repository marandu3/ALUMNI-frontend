<div class="min-h-screen flex items-center justify-center bg-gray-100 px-4">
    <div class="w-full max-w-md bg-white rounded-lg shadow-lg overflow-hidden">
        <div class="h-24 bg-gradient-to-r from-blue-700 via-purple-500 to-blue-500 flex items-center justify-center">
            <h2 class="text-2xl text-white font-bold">Welcome to your Account</h2>
        </div>

        <div class="p-8">
            <form class="space-y-6">
                <!-- Username Field -->
                <div class="space-y-2">
                    <label class="text-sm font-medium text-gray-700">Username</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-gray-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor">
                                <circle cx="12" cy="7" r="4" />
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                            </svg>
                        </div>
                        <input type="text" placeholder="Enter your username"
                            class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    </div>
                </div>

                <!-- Password Field -->
                <div class="space-y-2">
                    <label class="text-sm font-medium text-gray-700">Password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-gray-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                            </svg>
                        </div>
                        <input type="password" placeholder="Enter your password"
                            class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    </div>
                </div>

                <!-- Forgot Password Link -->
                <div class="flex justify-end">
                    <a (click)="navigateToForgotPassword()" routerLink="forgot-password" class="text-sm text-blue-600 hover:cursor-pointer hover:text-blue-800 hover:underline">
                        Forgot your password?
                    </a>
                </div>

                <!-- Login Button -->
                <button type="submit"
                    class="w-full flex hover:cursor-pointer justify-center py-2.5 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-all duration-200">
                    Sign in
                </button>

                <!-- Register Link -->
                <div class="text-center">
                    <span class="text-sm text-gray-600">Don't have an account? </span>
                    <a (click)="navigateToregister()" routerLink="register"
                        class="text-sm text-blue-600 hover:cursor-pointer hover:text-blue-800 hover:underline font-medium">
                        Register here
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
